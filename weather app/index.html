<html>
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Weather App</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=search" />
  </head>
  <body>
    <!--[if lt IE 7]>
      <p class="browsehappy">You are using an <strong>outdated</strong> browser. Please <a href="#">upgrade your browser</a> to improve your experience.</p>
    <![endif]-->
    <header>
      <h1 class="title">Weather App</h1>
      <input type="text" class="search-box" placeholder="Search for a city...">
      <button class="search-button"><span class="material-symbols-outlined">search</span></button>
    </header>
      <div class="location">
        <div class="city">City, Country</div>
        <div class="date">Date, Day</div>
      </div>
    
    <div class="current">
      <div class="temperature">0°C</div>
      <div class="humidity">humidity: </div>
      <div class="wind-speed">wind speed: </div>
      <div class="percipitation">precipitation: </div>
    </div>

    
    <script src="script.js" async defer></script>
  </body>
</html>
